# > 地区自动组：按节点名称关键词从 AllServer 筛选并智能选择；订阅节点命名不含对应关键词时不会进入该地区组。
HongKong = smart, policy-regex-filter=(?i)(港|香港|🇭🇰|HK|Hong ?Kong), no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png, include-other-group=AllServer
TaiWan = smart, policy-regex-filter=(?i)(台|臺|台湾|臺灣|🇹🇼|TW|Taiwan), no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/China.png, include-other-group=AllServer
Japan = smart, policy-regex-filter=(?i)(日|日本|🇯🇵|JP|Japan), no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png, include-other-group=AllServer
Singapore = smart, policy-regex-filter=(?i)(坡|新加坡|狮城|獅城|🇸🇬|SG|Singapore), no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png, include-other-group=AllServer
America = smart, policy-regex-filter=(?i)(美|美国|美國|🇺🇸|US|United ?States|America), no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png, include-other-group=AllServer

# > 订阅入口：必须替换 YOUR_SUBSCRIPTION_URL；每日更新一次，并过滤流量、到期、公告等非节点条目。
AllServer = select, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Airport.png, policy-path=YOUR_SUBSCRIPTION_URL, update-interval=86400, policy-regex-filter=(?i)^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|国内|地址|频道|说明|提示|教程|关注|更新|作者|加入|USE|USED|TOTAL|Traffic|Expire|EMAIL|Panel|Channel|Author|[0-9]{4}-[0-9]{2}-[0-9]{2}|[0-9]+G)).+$

[Rule]
# > 规则自上而下、首次命中即停止；明确域名和专项服务必须位于通用代理、国内直连及 FINAL 之前。
# > 基础规则：局域网与系统流量直连；SSH 和 .data 交由 Final；自定义 Direct.list 处理明确直连项。
RULE-SET,LAN,DIRECT,no-resolve
RULE-SET,SYSTEM,DIRECT
DEST-PORT,22,Final
RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/Direct.list,DIRECT,extended-matching
DOMAIN-SUFFIX,data,Final

# > AI 与 GitHub 补充：覆盖 OpenAI 登录、静态资源及 Copilot 相关域名，优先于远程规则匹配并保持同一服务出口。
DOMAIN-SUFFIX,chatgpt.com,AI
DOMAIN-SUFFIX,openai.com,AI
DOMAIN-SUFFIX,oaistatic.com,AI
DOMAIN-SUFFIX,oaiusercontent.com,AI
DOMAIN-SUFFIX,oaistatsig.com,AI
DOMAIN-SUFFIX,workos.com,AI
DOMAIN-SUFFIX,workoscdn.com,AI

DOMAIN,api.github.com,GitHub
DOMAIN-SUFFIX,githubcopilot.com,AI
DOMAIN,copilot-proxy.githubusercontent.com,AI
DOMAIN,origin-tracker.githubusercontent.com,AI

# > 已知域名修正：补足远程规则可能遗漏的 YouTube、Spotify、微信登录、Microsoft 与游戏域名。
DOMAIN-SUFFIX,gvt2.com,YouTube
DOMAIN,audio-ak-spotify-com.akamaized.net,Spotify
DOMAIN,apd-pcdnwxlogin.teg.tencent-cloud.net,DIRECT
DOMAIN-SUFFIX,msedge.net,Microsoft
DOMAIN-SUFFIX,deadspacegame.com,Games

# > 广告拦截：三组规则统一交给 AdBlock；出现误杀时可临时把 AdBlock 切到 DIRECT 验证，无需删除规则。
DOMAIN-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/Ads_SukkaW_Domain.list,AdBlock,extended-matching
RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/Ads_SukkaW_Extra.list,AdBlock,extended-matching
RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/Reject.list,AdBlock,extended-matching

