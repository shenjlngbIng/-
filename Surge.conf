# 地区策略
HongKong = url-test, policy-regex-filter=(?i)(^Fail-Closed$|香港|港区|港區|港线|港線|港[0-9 _-]|🇭🇰|Hong ?Kong|(^|[^A-Za-z])HK([^A-Za-z]|$)), tolerance=50, interval=600, evaluate-before-use=true, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=AllServer
TaiWan = url-test, policy-regex-filter=(?i)(^Fail-Closed$|台湾|台灣|臺灣|台北|臺北|高雄|台区|台區|台[0-9 _-]|臺[0-9 _-]|🇹🇼|Taiwan|(^|[^A-Za-z])TW([^A-Za-z]|$)), tolerance=50, interval=600, evaluate-before-use=true, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=AllServer
Japan = url-test, policy-regex-filter=(?i)(^Fail-Closed$|日本|东京|東京|大阪|日区|日區|日[0-9 _-]|🇯🇵|Japan|(^|[^A-Za-z])JP([^A-Za-z]|$)), tolerance=50, interval=600, evaluate-before-use=true, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=AllServer
Singapore = url-test, policy-regex-filter=(?i)(^Fail-Closed$|新加坡|狮城|獅城|🇸🇬|Singapore|(^|[^A-Za-z])SG([^A-Za-z]|$)), tolerance=50, interval=600, evaluate-before-use=true, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=AllServer
America = url-test, policy-regex-filter=(?i)(^Fail-Closed$|美国|美國|美区|美區|美东|美东|美西|美中|美[0-9 _-]|洛杉矶|洛杉磯|圣何塞|聖何塞|西雅图|西雅圖|纽约|紐約|🇺🇸|United ?States|America|(^|[^A-Za-z])US([^A-Za-z]|$)), tolerance=50, interval=600, evaluate-before-use=true, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=AllServer

# 仅纳入本地 [Proxy] 中经过审核的静态节点；禁止运行时 policy-path
AllServer = select, Fail-Closed, no-alert=0, hidden=0, include-all-proxies=1, policy-regex-filter=(?i)^(?!Fail-Closed$)(?!.*(DIRECT|REJECT|直连|直連|绕过|繞過|Bypass|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|国内|地址|频道|说明|提示|教程|关注|更新|作者|加入|USED|TOTAL|Traffic|Expire|EMAIL|Panel|Channel|Author|[0-9]{4}-[0-9]{2}-[0-9]{2})).+$

