RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/TikTok.list,TikTok,extended-matching
RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/Bahamut.list,TaiWan,extended-matching
RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/BiliBiliIntl.list,Streaming,extended-matching
