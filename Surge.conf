RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/AppleServers.list,Apple,extended-matching

# > 通用兜底：受限域名走 Proxy，中国域名和中国 IP 直连，其余交给 Final；dns-failed 使解析失败的请求仍进入最终策略。
RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/ProxyGFW.list,Proxy,extended-matching
