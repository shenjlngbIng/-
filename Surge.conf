RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/AI.list,AI,extended-matching

# > 流媒体：按平台策略组分流；Bahamut 固定使用 TaiWan，国际版哔哩哔哩使用 Streaming。
