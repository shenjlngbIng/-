# Telegram 域名和网段走专用组。紧跟着的 AND 是一条防绕过规则：Telegram 进程如果试图直接连接 IPv4 字面地址，
# 就用 REJECT-NO-DROP 拦住，而不是让它绕开域名分流。若 Telegram 完全无法连上，先确认规则集是否更新成功、
# 所选节点是否可用；排障时也可以暂时注释 AND 这一行验证，但不建议长期删除。
RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/Telegram.list,Telegram,extended-matching
AND,((PROCESS-NAME,Telegram),(HOSTNAME-TYPE,IPv4)),REJECT-NO-DROP

