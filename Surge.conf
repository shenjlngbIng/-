# 不再使用 ChinaDomain 和 GEOIP,CN 直连兜底：前者含宽泛 User-Agent，后者会让未知或 IP 字面量的
# 中国地址静默暴露真实出口。只有用户手动把 Domestic 切为 DIRECT 时，明确列出的国内域名才会直连；
# 其余一律交给只含代理出口的 Final。
# FINAL 带 dns-failed，保证解析失败仍进入代理策略；FINAL 必须留在整段最后。
FINAL,Final,dns-failed
