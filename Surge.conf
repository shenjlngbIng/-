Telegram = select, Proxy, HongKong, TaiWan, Japan, Singapore, America, AllServer, no-alert=0, hidden=0, include-all-proxies=0
X = select, Proxy, HongKong, TaiWan, Japan, Singapore, America, AllServer, no-alert=0, hidden=0, include-all-proxies=0
Apple = select, DIRECT, Proxy, HongKong, TaiWan, Japan, Singapore, America, AllServer, no-alert=0, hidden=0, include-all-proxies=0
Google = select, Proxy, HongKong, TaiWan, Japan, Singapore, America, AllServer, no-alert=0, hidden=0, include-all-proxies=0
Microsoft = select, Proxy, HongKong, TaiWan, Japan, Singapore, America, AllServer, no-alert=0, hidden=0, include-all-proxies=0
Games = select, Proxy, HongKong, TaiWan, Japan, Singapore, America, AllServer, no-alert=0, hidden=0, include-all-proxies=0

# 无全节点 Auto；地区组只在被选中时测试。1800 秒有效期与 150 ms 容差减少切换
# 专用 AI/解锁节点不进入通用地区测速，但仍可在 AllServer 手动选择
HongKong = url-test, Fail-Closed, policy-regex-filter=(?i)^(?!.*(?:Gemini|GPT|ChatGPT|Claude|OpenAI|专用|專用|解锁|解鎖)).*(?:香港|港区|港區|港线|港線|港[0-9 _-]|🇭🇰|Hong ?Kong|(?:^|[^A-Za-z])HK(?:[^A-Za-z]|$)), tolerance=150, interval=1800, evaluate-before-use=true, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=AllServer
TaiWan = url-test, Fail-Closed, policy-regex-filter=(?i)^(?!.*(?:Gemini|GPT|ChatGPT|Claude|OpenAI|专用|專用|解锁|解鎖)).*(?:台湾|台灣|臺灣|台北|臺北|高雄|台区|台區|台[0-9 _-]|臺[0-9 _-]|🇹🇼|Taiwan|(?:^|[^A-Za-z])TW(?:[^A-Za-z]|$)), tolerance=150, interval=1800, evaluate-before-use=true, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=AllServer
Japan = url-test, Fail-Closed, policy-regex-filter=(?i)^(?!.*(?:Gemini|GPT|ChatGPT|Claude|OpenAI|专用|專用|解锁|解鎖)).*(?:日本|东京|東京|大阪|日区|日區|日[0-9 _-]|🇯🇵|Japan|(?:^|[^A-Za-z])JP(?:[^A-Za-z]|$)), tolerance=150, interval=1800, evaluate-before-use=true, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=AllServer
Singapore = url-test, Fail-Closed, policy-regex-filter=(?i)^(?!.*(?:Gemini|GPT|ChatGPT|Claude|OpenAI|专用|專用|解锁|解鎖)).*(?:新加坡|狮城|獅城|🇸🇬|Singapore|(?:^|[^A-Za-z])SG(?:[^A-Za-z]|$)), tolerance=150, interval=1800, evaluate-before-use=true, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=AllServer
America = url-test, Fail-Closed, policy-regex-filter=(?i)^(?!.*(?:Gemini|GPT|ChatGPT|Claude|OpenAI|专用|專用|解锁|解鎖)).*(?:美国|美國|美区|美區|美东|美東|美西|美中|美[0-9 _-]|洛杉矶|洛杉磯|圣何塞|聖何塞|西雅图|西雅圖|纽约|紐約|🇺🇸|United ?States|America|(?:^|[^A-Za-z])US(?:[^A-Za-z]|$)), tolerance=150, interval=1800, evaluate-before-use=true, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=AllServer

# 【严格订阅边界】本配置不启用 policy-path；名称正则不能验证外部策略类型
# 仅把已审计节点以静态 [Proxy] 行加入设备私有副本，再运行同版静态审计
# 禁止 direct/reject 别名、skip-cert-verify=true、sni=off 与未核准协议
# include-all-proxies=1 仅收纳上述静态 [Proxy] 节点
AllServer = select, Fail-Closed, no-alert=0, hidden=0, include-all-proxies=1, policy-regex-filter=(?i)^(?!Fail-Closed$)(?!.*(DIRECT|REJECT|直连|直連|绕过|繞過|Bypass|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|国内|地址|频道|说明|提示|教程|关注|更新|作者|加入|USED|TOTAL|Traffic|Expire|EMAIL|Panel|Channel|Author|[0-9]{4}-[0-9]{2}-[0-9]{2})).+$

