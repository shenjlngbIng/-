# > 微信保持直连，避免被后续通用代理规则接管。
RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/WeChat.list,DIRECT,extended-matching

# > Telegram：服务规则交给 Telegram；下一行拦截该进程直连 IPv4 字面地址，避免绕过域名分流，连接异常时优先检查此行。
RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/Telegram.list,Telegram,extended-matching
AND,((PROCESS-NAME,Telegram),(HOSTNAME-TYPE,IPv4)),REJECT-NO-DROP

# > 常用服务：分别交给对应策略组，便于单独切换节点或直连。
RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/Github.list,GitHub,extended-matching
RULE-SET,https://raw.githubusercontent.com/shenjlngbIng/-/main/Rules/Twitter.list,X,extended-matching
