# App 内置 HTTPDNS 与直接连接的中国大陆 IP 由 GeoIP 兜底。
# no-resolve 防止未收录的境外域名在到达 FINAL 前触发本地 DNS 或被误直连。
GEOIP,CN,Domestic,no-resolve

# 国内域名与中国 IP 已优先分流；其余 UDP/3478 交给 ChatGPT，其他 STUN 走 Proxy。
# 节点不支持 UDP 时由 General 拒绝，防止境外实时通信静默直连泄漏。
AND,((PROTOCOL,UDP),(DEST-PORT,3478)),ChatGPT
PROTOCOL,STUN,Proxy

# FINAL 必须位于最后；dns-failed 仍进入代理。
FINAL,Final,dns-failed
