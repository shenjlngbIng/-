name: Audit Surge Profile

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Compile audit tools
        run: |
          python3 -m py_compile tools/audit_config.py tools/audit_rules.py tools/stage_surge_zip.py tools/test_audit_config.py

      - name: Audit profile and runtime rules
        run: |
          python3 tools/audit_config.py Surge.conf
          python3 tools/audit_rules.py Rules --profile Surge.conf
          python3 tools/test_audit_config.py
